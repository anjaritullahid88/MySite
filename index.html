<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Style Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">HOUSEOFSMITH</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Tracking</a>
        <a href="#">Payment</a>
        <a href="#">Help</a>
    </nav>
</header>

<section class="hero">
    <div class="slide active">
        <img src="images/banner1.jpg">
        <div class="hero-text">
            <h1>BIG RAMADAN SALE</h1>
            <p>DISC UP TO 80%</p>
        </div>
    </div>

    <div class="slide">
        <img src="images/banner2.jpg">
        <div class="hero-text">
            <h1>NEW COLLECTION</h1>
            <p>START FROM 69K</p>
        </div>
    </div>

    <div class="slide">
        <img src="images/banner3.jpg">
        <div class="hero-text">
            <h1>FLASH VOUCHER</h1>
            <p>LIMITED TIME</p>
        </div>
    </div>
</section>

<section class="products">
<h2>Exclusive Launch</h2>

<div class="grid">
<div class="card">
<img src="images/p1.jpg">
<h3>Leather Boots</h3>
<p>$89</p>
</div>

<div class="card">
<img src="images/p2.jpg">
<h3>Classic Belt</h3>
<p>$49</p>
</div>

<div class="card">
<img src="images/p3.jpg">
<h3>Wallet Brown</h3>
<p>$39</p>
</div>

<div class="card">
<img src="images/p4.jpg">
<h3>Backpack</h3>
<p>$69</p>
</div>

</div>
</section>

<script src="script.js"></script>

</body>
</html>
